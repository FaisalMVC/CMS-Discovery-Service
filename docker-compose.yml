version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: cms-postgres
    environment:
      POSTGRES_DB: cms_db
      POSTGRES_USER: cms_user
      POSTGRES_PASSWORD: cms_password
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cms-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: rabbit_user
      RABBITMQ_DEFAULT_PASS: rabbit_password
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio:latest
    container_name: cms-minio
    environment:
      MINIO_ROOT_USER: minio_user
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: discovery-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  redis:
    image: redis:7-alpine
    container_name: discovery-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  cms-service:
    build:
      context: ./cms-service
    image: thmanyah/cms-service:latest
    container_name: cms-service
    command: sh entrypoint.sh
    env_file: ./cms-service/.env
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - rabbitmq
      - minio

  discovery-service:
    build:
      context: ./discovery-service
    image: thmanyah/discovery-service:latest
    container_name: discovery-service
    env_file: ./discovery-service/.env
    ports:
      - '3001:3001'
    depends_on:
      - opensearch
      - redis
      - rabbitmq

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
  opensearch_data:
  redis_data:
